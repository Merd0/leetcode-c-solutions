name: Repository Validation

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Regenerate indexes and validate repository data
        run: python3 scripts/generate_indexes.py

      - name: Confirm read-only validation also passes
        run: python3 scripts/generate_indexes.py --check

      - name: Verify generated files are committed
        run: git diff --exit-code
